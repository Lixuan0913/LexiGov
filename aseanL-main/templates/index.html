<!DOCTYPE html>
<html>

<head>

<title>AI Policy Simplifier</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:750px;
background:#161616;
padding:40px;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

h1{
text-align:center;
margin-bottom:30px;
}

textarea{
width:100%;
height:130px;
background:#111;
border:1px solid #333;
color:white;
padding:12px;
border-radius:10px;
margin-bottom:20px;
font-size:14px;
}

.buttons{
text-align:center;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:0.25s;
}

.mic{
background:#2d7dff;
color:white;
}

.simplify{
background:#00c97f;
color:white;
}

button:hover{
transform:scale(1.07);
opacity:0.9;
}

.output{
margin-top:25px;
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #333;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Policy Simplifier</h1>

<textarea id="textInput" placeholder="Press the microphone and start speaking..."></textarea>

<div class="buttons">

<button class="mic" onclick="startListening()">🎤 Audio Translator</button>

<button class="simplify" onclick="simplifyText()">✨ Simplifier</button>

</div>

<div class="output">

<h3>Simplified Text</h3>
<p id="simple"></p>

<h3>Transcription</h3>
<p id="transcription"></p>

<h3>Answer</h3>
<p id="answer"></p>

<h3>Sources</h3>
<p id="sources"></p>

</div>

</div>

<script>

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.lang = "en-US"
recognition.continuous = false

function startListening(){

recognition.start()

}

recognition.onresult = function(event){

let speech = event.results[0][0].transcript

document.getElementById("textInput").value = speech

}

function simplifyText(){

let text = document.getElementById("textInput").value

fetch("/simplify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text:text})
})

.then(res=>res.json())
.then(data=>{

if(data.error){

document.getElementById("status").innerText=data.error

return

}

document.getElementById("status").innerText="Done"

document.getElementById("transcription").innerText=data.transcription
document.getElementById("language").innerText=data.language
document.getElementById("textInput").value=data.transcription
document.getElementById("answer").innerText = data.answer

// format sources nicely
if(data.sources){
document.getElementById("sources").innerText = data.sources.join("\n")
}

})

}

</script>

</body>

</html>
