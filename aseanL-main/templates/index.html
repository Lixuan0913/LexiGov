<!DOCTYPE html>
<html>

<head>
<title>AI Policy Simplifier</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:750px;
background:#161616;
padding:40px;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

h1{
text-align:center;
margin-bottom:30px;
}

textarea{
width:100%;
height:130px;
background:#111;
border:1px solid #333;
color:white;
padding:12px;
border-radius:10px;
margin-bottom:20px;
font-size:14px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.mic{
background:#2d7dff;
color:white;
}

.output{
margin-top:25px;
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #333;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Policy Simplifier</h1>

<textarea id="textInput" placeholder="Press microphone and speak..."></textarea>

<div style="text-align:center">
<button class="mic" onclick="startRecording()">🎤 Speak</button>
</div>

<div class="output">

<p id="status"></p>

<h3>Detected Language</h3>
<p id="language"></p>

<h3>Transcription</h3>
<p id="transcription"></p>
  
<h3>Answer</h3>
<p id="answer"></p>

<h3>Sources</h3>
<p id="sources"></p>

</div>

</div>

<script>

let mediaRecorder
let audioChunks=[]
let stream
let audioContext
let analyser
let silenceStart=null

const silenceThreshold = 0.02
const silenceDelay = 2000

async function startRecording(){

audioChunks=[]

document.getElementById("status").innerText="Recording..."

try{

stream = await navigator.mediaDevices.getUserMedia({audio:true})

}catch(err){

document.getElementById("status").innerText="Microphone permission denied"
return

}

audioContext = new AudioContext()

const source = audioContext.createMediaStreamSource(stream)

analyser = audioContext.createAnalyser()

analyser.fftSize = 2048

source.connect(analyser)

mediaRecorder = new MediaRecorder(stream)

mediaRecorder.ondataavailable = e=>{
if(e.data.size>0){
audioChunks.push(e.data)
}
}

mediaRecorder.onstop = sendAudio

mediaRecorder.start(200)

detectSilence()

}

function detectSilence(){

const data = new Uint8Array(analyser.fftSize)

function check(){

analyser.getByteTimeDomainData(data)

let sum=0

for(let i=0;i<data.length;i++){
let value=(data[i]-128)/128
sum+=value*value
}

let volume=Math.sqrt(sum/data.length)

if(volume < silenceThreshold){

if(!silenceStart){
silenceStart=Date.now()
}

if(Date.now()-silenceStart > silenceDelay){

stopRecording()
return

}

}else{

silenceStart=null

}

requestAnimationFrame(check)

}

check()

}

function stopRecording(){

if(mediaRecorder && mediaRecorder.state !== "inactive"){
mediaRecorder.stop()
}

if(stream){
stream.getTracks().forEach(track=>track.stop())
stream=null
}

if(audioContext){
audioContext.close()
audioContext=null
}

}

function sendAudio(){

if(audioChunks.length===0){

document.getElementById("status").innerText="No audio recorded"

return

}

document.getElementById("status").innerText="Processing..."

const audioBlob=new Blob(audioChunks,{type:"audio/webm"})

const formData=new FormData()

formData.append("audio",audioBlob,"recording.webm")

fetch("/transcribe",{

method:"POST",
body:formData

})
.then(res=>res.json())
.then(data=>{

if(data.error){

document.getElementById("status").innerText=data.error

return

}

document.getElementById("status").innerText="Done"

document.getElementById("transcription").innerText=data.transcription
document.getElementById("language").innerText=data.language
document.getElementById("textInput").value=data.transcription
document.getElementById("answer").innerText = data.answer

// format sources nicely
if(data.sources){
document.getElementById("sources").innerText = data.sources.join("\n")
}

})

}

</script>

</body>
</html>
